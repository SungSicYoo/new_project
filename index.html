<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SungSic's Graffiti Wall & Community</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #38bdf8;
            --toolbar-bg: rgba(30, 41, 59, 0.8);
            --modal-bg: rgba(15, 23, 42, 0.95);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* 배경 질감 (벽돌 느낌) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(30deg, #111 12%, transparent 12.5%, transparent 87%, #111 87.5%, #111),
                linear-gradient(150deg, #111 12%, transparent 12.5%, transparent 87%, #111 87.5%, #111),
                linear-gradient(30deg, #111 12%, transparent 12.5%, transparent 87%, #111 87.5%, #111),
                linear-gradient(150deg, #111 12%, transparent 12.5%, transparent 87%, #111 87.5%, #111),
                linear-gradient(60deg, #161616 25%, transparent 25.5%, transparent 75%, #161616 75%, #161616),
                linear-gradient(60deg, #161616 25%, transparent 25.5%, transparent 75%, #161616 75%, #161616);
            background-size: 80px 140px;
            background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
            opacity: 0.3;
            z-index: -1;
        }

        .main-viewport {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        #canvas {
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        /* 상단 타이틀 */
        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color), 0 0 20px var(--accent-color);
            opacity: 0.8;
        }

        /* 하단 툴바 */
        .toolbar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toolbar-bg);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .btn:hover { background: var(--accent-color); color: black; }
        .btn.active { background: var(--accent-color); color: black; }

        .btn-comment { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.4); }
        .btn-comment:hover { background: #22c55e; color: white; }

        /* 댓글 섹션 */
        .comment-section {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px 50px;
            background: transparent;
        }

        #disqus_thread {
            background: rgba(30, 41, 59, 0.5);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* 모달 스타일 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--modal-bg);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            animation: modalSlideUp 0.3s ease-out;
            position: relative;
        }

        @keyframes modalSlideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #e2e8f0; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155;
            border-radius: 10px; color: white; box-sizing: border-box;
        }
        .form-group textarea { height: 100px; resize: none; }

        .btn-submit { width: 100%; padding: 14px; background: var(--accent-color); color: #0f172a; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .guide { position: fixed; top: 20px; right: 20px; font-size: 0.7rem; color: #475569; text-align: right; z-index: 5; }
    </style>
</head>
<body>

    <div class="main-viewport">
        <div class="header">
            <h1>Graffiti Wall</h1>
        </div>

        <div class="guide">
            마우스나 터치로 그려보세요.<br>스크롤을 내려 댓글을 확인하세요.
        </div>

        <canvas id="canvas"></canvas>
    </div>

    <!-- 댓글 섹션 -->
    <div class="comment-section" id="comments">
        <h2 style="color: var(--accent-color); margin-bottom: 30px;">Community Feed</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://test-vicufszv5b.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <div class="toolbar">
        <div class="tool-group">
            <input type="color" id="colorPicker" value="#38bdf8" style="border:none; width:25px; height:25px; background:none; cursor:pointer;">
            <input type="range" id="sizePicker" min="1" max="50" value="5" style="width:60px; accent-color:var(--accent-color);">
        </div>

        <div class="tool-group">
            <button id="drawBtn" class="btn active">브러시</button>
            <button id="eraseBtn" class="btn">지우개</button>
            <button id="clearBtn" class="btn" style="color: #ef4444;">삭제</button>
        </div>

        <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 5px;"></div>

        <button class="btn btn-comment" onclick="document.getElementById('comments').scrollIntoView({behavior: 'smooth'})">댓글</button>
        <button class="btn" onclick="toggleModal(true)" style="background: rgba(168, 85, 247, 0.2); color: #a855f7;">제휴</button>
    </div>

    <!-- 제휴 문의 모달 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button onclick="toggleModal(false)" style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            <h2 style="color: var(--accent-color); margin-top:0;">제휴 문의</h2>
            <form action="https://formspree.io/f/maqpgvqy" method="POST">
                <div class="form-group"><label>성함 / 기업명</label><input type="text" name="name" required></div>
                <div class="form-group"><label>이메일 주소</label><input type="email" name="_replyto" required></div>
                <div class="form-group"><label>문의 내용</label><textarea name="message" required></textarea></div>
                <button type="submit" class="btn-submit">문의 보내기</button>
            </form>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const sizePicker = document.getElementById('sizePicker');
        const drawBtn = document.getElementById('drawBtn');
        const eraseBtn = document.getElementById('eraseBtn');
        const clearBtn = document.getElementById('clearBtn');
        const modalOverlay = document.getElementById('modalOverlay');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let mode = 'draw';

        function resizeCanvas() {
            const tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.putImageData(tempImageData, 0, 0);
            loadCanvas();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function startDrawing(e) { if (e.target.tagName !== 'CANVAS') return; isDrawing = true; [lastX, lastY] = getCoordinates(e); }
        function draw(e) {
            if (!isDrawing) return;
            const [x, y] = getCoordinates(e);
            ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y);
            ctx.strokeStyle = mode === 'draw' ? colorPicker.value : '#050505';
            ctx.lineWidth = sizePicker.value;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            if (mode === 'draw') { ctx.shadowBlur = 2; ctx.shadowColor = colorPicker.value; }
            else { ctx.shadowBlur = 0; }
            ctx.stroke(); [lastX, lastY] = [x, y]; saveCanvas();
        }

        function stopDrawing() { isDrawing = false; }
        function getCoordinates(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return [clientX, clientY];
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        window.addEventListener('touchend', stopDrawing);

        drawBtn.onclick = () => { mode = 'draw'; drawBtn.classList.add('active'); eraseBtn.classList.remove('active'); };
        eraseBtn.onclick = () => { mode = 'erase'; eraseBtn.classList.add('active'); drawBtn.classList.remove('active'); };
        clearBtn.onclick = () => { if (confirm('모든 낙서를 지우시겠습니까?')) { ctx.clearRect(0, 0, canvas.width, canvas.height); localStorage.removeItem('graffiti_data'); } };

        function saveCanvas() { localStorage.setItem('graffiti_data', canvas.toDataURL()); }
        function loadCanvas() {
            const dataURL = localStorage.getItem('graffiti_data');
            if (dataURL) {
                const img = new Image();
                img.onload = () => { ctx.drawImage(img, 0, 0); };
                img.src = dataURL;
            }
        }

        function toggleModal(show) { modalOverlay.style.display = show ? 'flex' : 'none'; }
        modalOverlay.onclick = (e) => { if (e.target === modalOverlay) toggleModal(false); };
    </script>
</body>
</html>
