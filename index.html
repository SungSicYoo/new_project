<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Page</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.2rem;
      color: #94a3b8;
      max-width: 500px;
    }

    .highlight {
      color: #38bdf8;
    }

    .btn {
      margin-top: 2rem;
      padding: 12px 24px;
      border: none;
      border-radius: 30px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div>
    <h1>안녕하세요,<br><span class="highlight">유성식</span>입니다</h1>
    <p>
      사람을 세우는 것을 가장 중요한 가치로 여기며,<br>
      수학과 신앙, 그리고 삶을 연결하는 여정을 살아갑니다.
    </p>

    <button class="btn" onclick="alert('곧 더 많은 이야기가 업데이트됩니다!')">
      더 알아보기
    </button>
  </div>

  <footer>
    © 2026 Yoo Sung Sic
  </footer>
</body>
</html>
