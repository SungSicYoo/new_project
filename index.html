<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SungSic's Graffiti Wall</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #38bdf8;
            --toolbar-bg: rgba(30, 41, 59, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* 배경 질감 (벽돌 느낌) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(30deg, #111 12%, transparent 12.5%, transparent 87%, #111 87.5%, #111),
                linear-gradient(150deg, #111 12%, transparent 12.5%, transparent 87%, #111 87.5%, #111),
                linear-gradient(30deg, #111 12%, transparent 12.5%, transparent 87%, #111 87.5%, #111),
                linear-gradient(150deg, #111 12%, transparent 12.5%, transparent 87%, #111 87.5%, #111),
                linear-gradient(60deg, #161616 25%, transparent 25.5%, transparent 75%, #161616 75%, #161616),
                linear-gradient(60deg, #161616 25%, transparent 25.5%, transparent 75%, #161616 75%, #161616);
            background-size: 80px 140px;
            background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
            opacity: 0.3;
            z-index: -1;
        }

        #canvas {
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        /* 상단 타이틀 */
        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color), 0 0 20px var(--accent-color);
            opacity: 0.8;
        }

        .header p {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* 하단 툴바 */
        .toolbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toolbar-bg);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: bold;
        }

        input[type="color"] {
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            background: none;
        }

        input[type="range"] {
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .btn:hover {
            background: var(--accent-color);
            color: black;
        }

        .btn.active {
            background: var(--accent-color);
            color: black;
        }

        .btn-clear {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .btn-clear:hover {
            background: #ef4444;
            color: white;
        }

        /* 안내 문구 */
        .guide {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.7rem;
            color: #475569;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Graffiti Wall</h1>
        <p>유성식의 자유로운 낙서 공간</p>
    </div>

    <div class="guide">
        마우스나 터치로 그려보세요.<br>내용은 브라우저에 자동 저장됩니다.
    </div>

    <canvas id="canvas"></canvas>

    <div class="toolbar">
        <div class="tool-group">
            <label>COLOR</label>
            <input type="color" id="colorPicker" value="#38bdf8">
        </div>

        <div class="tool-group">
            <label>SIZE</label>
            <input type="range" id="sizePicker" min="1" max="50" value="5">
        </div>

        <div class="tool-group">
            <button id="drawBtn" class="btn active">브러시</button>
            <button id="eraseBtn" class="btn">지우개</button>
        </div>

        <div class="tool-group">
            <button id="clearBtn" class="btn btn-clear">전체 삭제</button>
            <button id="saveBtn" class="btn" style="background: rgba(56, 189, 248, 0.2); color: var(--accent-color);">이미지 저장</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const sizePicker = document.getElementById('sizePicker');
        const drawBtn = document.getElementById('drawBtn');
        const eraseBtn = document.getElementById('eraseBtn');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let mode = 'draw';

        // 캔버스 크기 조절
        function resizeCanvas() {
            const tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.putImageData(tempImageData, 0, 0);
            
            // 초기 로드 시 저장된 내용 불러오기
            loadCanvas();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 그리기 시작
        function startDrawing(e) {
            isDrawing = true;
            [lastX, lastY] = getCoordinates(e);
        }

        // 그리기 중
        function draw(e) {
            if (!isDrawing) return;
            
            const [x, y] = getCoordinates(e);

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            
            ctx.strokeStyle = mode === 'draw' ? colorPicker.value : '#050505';
            ctx.lineWidth = sizePicker.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // 브러시 효과 (약간의 그림자)
            if (mode === 'draw') {
                ctx.shadowBlur = 2;
                ctx.shadowColor = colorPicker.value;
            } else {
                ctx.shadowBlur = 0;
            }

            ctx.stroke();
            
            [lastX, lastY] = [x, y];
            saveCanvas(); // 그릴 때마다 저장
        }

        // 그리기 종료
        function stopDrawing() {
            isDrawing = false;
        }

        function getCoordinates(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return [clientX, clientY];
        }

        // 이벤트 리스너
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        window.addEventListener('touchend', stopDrawing);

        // 모드 전환
        drawBtn.onclick = () => {
            mode = 'draw';
            drawBtn.classList.add('active');
            eraseBtn.classList.remove('active');
        };

        eraseBtn.onclick = () => {
            mode = 'erase';
            eraseBtn.classList.add('active');
            drawBtn.classList.remove('active');
        };

        // 전체 삭제
        clearBtn.onclick = () => {
            if (confirm('모든 낙서를 지우시겠습니까?')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                localStorage.removeItem('graffiti_data');
            }
        };

        // 이미지 저장
        saveBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = 'my-graffiti.png';
            link.href = canvas.toDataURL();
            link.click();
        };

        // 데이터 저장 (로컬 스토리지)
        function saveCanvas() {
            localStorage.setItem('graffiti_data', canvas.toDataURL());
        }

        // 데이터 로드
        function loadCanvas() {
            const dataURL = localStorage.getItem('graffiti_data');
            if (dataURL) {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0);
                };
                img.src = dataURL;
            }
        }
    </script>
</body>
</html>
