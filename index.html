<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Page</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.2rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    .highlight {
      color: #38bdf8;
    }

    /* 게시판 스타일 */
    .guestbook {
      margin-top: 3rem;
      background: #1e293b;
      padding: 24px;
      border-radius: 16px;
      text-align: left;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .guestbook h2 {
      margin-top: 0;
      color: #38bdf8;
      font-size: 1.5rem;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input, textarea {
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 10px;
      border-radius: 8px;
      font-size: 1rem;
    }

    input { width: 30%; }
    textarea { width: 70%; flex-grow: 1; resize: none; height: 40px; }

    .btn-submit {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-submit:hover { background: #0ea5e9; }

    .message-list {
      list-style: none;
      padding: 0;
      max-height: 300px;
      overflow-y: auto;
    }

    .message-item {
      background: #334155;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      animation: fadeIn 0.5s ease-in-out;
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 5px;
    }

    .message-author { font-weight: bold; color: #38bdf8; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>안녕하세요,<br><span class="highlight">유성식</span>입니다</h1>
    <p>
      사람을 세우는 것을 가장 중요한 가치로 여기며,<br>
      수학과 신앙, 그리고 삶을 연결하는 여정을 살아갑니다.
    </p>

    <div class="guestbook">
      <h2>방문자 게시판</h2>
      <div class="input-group">
        <input type="text" id="nameInput" placeholder="이름" maxlength="10">
        <textarea id="messageInput" placeholder="따뜻한 한마디를 남겨주세요." maxlength="100"></textarea>
        <button class="btn-submit" onclick="addMessage()">등록</button>
      </div>
      <ul id="messageList" class="message-list">
        <!-- 메시지 출력 영역 -->
      </ul>
    </div>
  </div>

  <footer>
    © 2026 Yoo Sung Sic
  </footer>

  <script>
    const messageList = document.getElementById('messageList');

    // 페이지 로드 시 기존 메시지 불러오기
    window.onload = () => {
      const savedMessages = JSON.parse(localStorage.getItem('messages') || '[]');
      savedMessages.reverse().forEach(msg => renderMessage(msg));
    };

    function addMessage() {
      const nameInput = document.getElementById('nameInput');
      const messageInput = document.getElementById('messageInput');
      
      if (!nameInput.value.trim() || !messageInput.value.trim()) {
        alert('이름과 메시지를 모두 입력해주세요!');
        return;
      }

      const newMessage = {
        name: nameInput.value.trim(),
        text: messageInput.value.trim(),
        date: new Date().toLocaleString('ko-KR')
      };

      // 로컬 스토리지에 저장
      const savedMessages = JSON.parse(localStorage.getItem('messages') || '[]');
      savedMessages.push(newMessage);
      localStorage.setItem('messages', JSON.stringify(savedMessages));

      // 화면에 즉시 표시
      renderMessage(newMessage, true);
      
      // 입력창 초기화
      nameInput.value = '';
      messageInput.value = '';
    }

    function renderMessage(msg, isNew = false) {
      const li = document.createElement('li');
      li.className = 'message-item';
      li.innerHTML = `
        <div class="message-header">
          <span class="message-author">${msg.name}</span>
          <span>${msg.date}</span>
        </div>
        <div class="message-content">${msg.text}</div>
      `;
      
      if (isNew) {
        messageList.prepend(li);
      } else {
        messageList.appendChild(li);
      }
    }
  </script>
</body>
</html>
